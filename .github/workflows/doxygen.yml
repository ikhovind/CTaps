name: Build and deploy doxygen to github static pages

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install doxygen 
        run: sudo apt-get update && sudo apt-get install -y doxygen libglib2.0-dev graphviz
      - name: Build Doxygen
        run: |
             cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=Debug
             cmake --build ${{github.workspace}}/build --target docs 
      - name: Upload Doxygen
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload entire repository
          path: ${{github.workspace}}/build/docs/html/

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
